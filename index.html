<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Approximately Up Mods</title>
  <link rel="stylesheet" href="styles.css?v=20260701-public-guide-ru">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">Community mod hub</p>
      <h1>Approximately Up Mods</h1>
    </div>
    <div class="top-actions">
      <div class="language-switch" aria-label="Language">
        <button class="lang-button" type="button" data-lang="ru">RU</button>
        <button class="lang-button active" type="button" data-lang="en">EN</button>
      </div>
      <a class="primary-button nav-link" id="openUpload" href="upload.html" data-i18n="uploadButton"></a>
      <div class="profile-menu-wrap">
        <button class="profile-button" id="accountButton" type="button" aria-expanded="false" aria-controls="profileMenu">
          <img class="avatar avatar-image" id="profileAvatar" src="assets/default-avatar.png" alt="">
          <span class="profile-name" id="profileName"></span>
        </button>
        <div class="profile-menu" id="profileMenu" hidden></div>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="hero-copy">
        <h2 data-i18n="heroTitle"></h2>
      </div>
      <div class="hero-stats" data-i18n-aria="statsAria">
        <div class="stat-card"><strong id="modCount">0</strong><span data-i18n="modsCountLabel"></span></div>
        <div class="stat-card"><strong>23954373</strong><span data-i18n="currentBuildLabel"></span></div>
      </div>
    </section>


    <section class="guide-grid" aria-label="Site guide">
      <article class="guide-card">
        <p class="eyebrow" data-i18n="guideInstallEyebrow"></p>
        <h3 data-i18n="guideInstallTitle"></h3>
        <ol>
          <li data-i18n="guideInstallStep1"></li>
          <li data-i18n="guideInstallStep2"></li>
          <li data-i18n="guideInstallStep3"></li>
          <li data-i18n="guideInstallStep4"></li>
          <li data-i18n="guideInstallStep5"></li>
        </ol>
      </article>
      <article class="guide-card">
        <p class="eyebrow" data-i18n="guideRulesEyebrow"></p>
        <h3 data-i18n="guideRulesTitle"></h3>
        <ul>
          <li data-i18n="guideRule1"></li>
          <li data-i18n="guideRule2"></li>
          <li data-i18n="guideRule3"></li>
          <li data-i18n="guideRule4"></li>
        </ul>
      </article>
    </section>
    <section class="controls" data-i18n-aria="filtersAria">
      <label class="search">
        <span data-i18n="searchLabel"></span>
        <input id="searchInput" type="search" data-i18n-placeholder="searchPlaceholder">
      </label>
      <div class="chips" id="categoryChips"></div>
    </section>



    <section class="mod-detail" id="modDetail" hidden>
      <button class="back-button" type="button" id="backToCatalog" data-i18n="backToCatalog"></button>
      <div class="detail-layout">
        <div class="detail-main">
          <div class="detail-meta" id="detailMeta"></div>
          <h2 id="detailTitle"></h2>
          <p id="detailSummary"></p>
          <div class="detail-actions">
            <a class="primary-button detail-download" id="detailDownload" download></a>
            <button class="secondary-button danger-button" id="detailDelete" type="button" hidden></button>
          </div>
        </div>
        <aside class="detail-info" id="detailInfo"></aside>
      </div>
      <div class="screenshots" id="detailScreenshots"></div>
    </section>

    <section class="content">
      <aside class="sidebar">
        <h3 data-i18n="compatTitle"></h3>
        <p data-i18n="compatText"></p>
        <div class="account-panel" id="accountPanel"></div>
        <div class="legend">
          <span><i class="dot ok"></i><span data-i18n="statusOk"></span></span>
          <span><i class="dot warn"></i><span data-i18n="statusWarn"></span></span>
          <span><i class="dot bad"></i><span data-i18n="statusBad"></span></span>
        </div>
      </aside>

      <section class="mods-grid" id="modsGrid" data-i18n-aria="modsListAria"></section>
    </section>
  </main>

  <dialog id="uploadDialog">
    <form method="dialog" class="upload-form">
      <div class="dialog-head">
        <h2 data-i18n="uploadTitle"></h2>
        <button class="icon-button" value="cancel" data-i18n-aria="closeAria">x</button>
      </div>
      <label>
        <span data-i18n="fieldName"></span>
        <input id="modNameInput" type="text" data-i18n-placeholder="fieldNamePlaceholder">
      </label>
      <label>
        <span data-i18n="fieldCategory"></span>
        <select id="modCategoryInput">
          <option>Tools</option>
          <option>Planets</option>
          <option>Gameplay</option>
          <option>Map</option>
          <option>Cosmetic</option>
        </select>
      </label>
      <label>
        <span data-i18n="fieldGameVersion"></span>
        <input id="modBuildInput" type="text" placeholder="23954373">
      </label>
      <label>
        <span data-i18n="fieldFile"></span>
        <input id="modFileInput" type="file" accept=".zip,.dll" required>
      </label>
      <label>
        <span data-i18n="fieldScreenshots"></span>
        <input id="modScreenshotsInput" type="file" accept="image/png,image/jpeg,image/webp" multiple>
      </label>
      <section class="upload-rules">
        <h3 data-i18n="uploadRulesTitle"></h3>
        <ul>
          <li data-i18n="uploadRuleFile"></li>
          <li data-i18n="uploadRuleScreens"></li>
          <li data-i18n="uploadRuleDescription"></li>
          <li data-i18n="uploadRuleSafety"></li>
        </ul>
      </section>
      <label>
        <span data-i18n="fieldDescription"></span>
        <textarea id="modDescriptionInput" rows="4" data-i18n-placeholder="fieldDescriptionPlaceholder"></textarea>
      </label>
      <button class="primary-button" id="saveDraftButton" type="button" data-i18n="saveDraft"></button>
      <p class="notice" id="uploadMessage"></p>
    </form>
  </dialog>


  <dialog id="accountDialog">
    <form method="dialog" class="upload-form">
      <div class="dialog-head">
        <h2 data-i18n="accountTitle"></h2>
        <button class="icon-button" value="cancel" data-i18n-aria="closeAria">x</button>
      </div>
      <p class="muted" data-i18n="accountHelp"></p>
      <label>
        <span>Email</span>
        <input id="emailInput" type="email" autocomplete="email">
      </label>
      <label>
        <span data-i18n="passwordLabel"></span>
        <input id="passwordInput" type="password" autocomplete="current-password">
      </label>
      <div class="button-row">
        <button class="primary-button" id="loginButton" type="button" data-i18n="loginButton"></button>
        <button class="secondary-button" id="signupButton" type="button" data-i18n="signupButton"></button>
      </div>
      <p class="notice" id="accountMessage"></p>
    </form>
  </dialog>

  <dialog class="screenshot-lightbox" id="screenshotLightbox">
    <button class="lightbox-close" id="lightboxClose" type="button" data-i18n-aria="closeAria">x</button>
    <figure>
      <img id="lightboxImage" alt="">
      <figcaption id="lightboxCaption"></figcaption>
    </figure>
  </dialog>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js?v=20260630-login-upload-fix"></script>
  <script src="script.js?v=20260701-public-guide-ru"></script>
</body>
</html>
