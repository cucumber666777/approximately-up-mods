<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Approximately Up Mods Accounts</title>
  <link rel="stylesheet" href="styles.css?v=20260630-accounts">
</head>
<body>
  <header class="topbar">
    <a class="ghost-link" href="../">← Catalog V1</a>
    <div class="brand">
      <span class="eyebrow">Community mod hub</span>
      <h1>Approximately Up Mods</h1>
    </div>
    <div class="top-actions">
      <div class="language-switch" aria-label="Language">
        <button class="lang-button active" type="button" data-lang="ru">RU</button>
        <button class="lang-button" type="button" data-lang="en">EN</button>
      </div>
      <button class="primary-button" id="accountButton" type="button"></button>
    </div>
  </header>

  <main>
    <section class="hero">
      <div>
        <p class="eyebrow" id="heroKicker"></p>
        <h2 id="heroTitle"></h2>
        <p id="heroText"></p>
      </div>
      <div class="hero-panel">
        <strong id="modCount">0</strong>
        <span id="modCountLabel"></span>
        <small id="backendStatus"></small>
      </div>
    </section>

    <section class="toolbar">
      <label class="search">
        <span id="searchLabel"></span>
        <input id="searchInput" type="search">
      </label>
      <div class="chips" id="categoryChips"></div>
      <button class="secondary-button" id="openSubmit" type="button"></button>
    </section>

    <section class="layout">
      <aside class="profile-card" id="profileCard"></aside>
      <section class="mods-grid" id="modsGrid"></section>
    </section>
  </main>

  <dialog id="accountDialog">
    <form class="modal-card" method="dialog">
      <div class="modal-head">
        <h2 id="accountTitle"></h2>
        <button class="icon-button" value="cancel" aria-label="Close">×</button>
      </div>
      <p class="muted" id="accountHelp"></p>
      <label><span>Email</span><input id="emailInput" type="email" autocomplete="email"></label>
      <label><span id="passwordLabel"></span><input id="passwordInput" type="password" autocomplete="current-password"></label>
      <div class="button-row">
        <button class="primary-button" id="loginButton" type="button"></button>
        <button class="secondary-button" id="signupButton" type="button"></button>
      </div>
      <button class="ghost-button" id="demoLoginButton" type="button"></button>
      <p class="notice" id="accountMessage"></p>
    </form>
  </dialog>

  <dialog id="submitDialog">
    <form class="modal-card" method="dialog">
      <div class="modal-head">
        <h2 id="submitTitle"></h2>
        <button class="icon-button" value="cancel" aria-label="Close">×</button>
      </div>
      <p class="muted" id="submitHelp"></p>
      <label><span id="modNameLabel"></span><input id="modNameInput" type="text"></label>
      <label><span id="modCategoryLabel"></span><select id="modCategoryInput"><option>Tools</option><option>Gameplay</option><option>Planets</option><option>Map</option><option>Cosmetic</option></select></label>
      <label><span id="modVersionLabel"></span><input id="modVersionInput" type="text" placeholder="0.1.0"></label>
      <label><span id="modDescriptionLabel"></span><textarea id="modDescriptionInput" rows="5"></textarea></label>
      <button class="primary-button" id="saveDraftButton" type="button"></button>
      <p class="notice" id="submitMessage"></p>
    </form>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js?v=20260630-accounts"></script>
  <script src="app.js?v=20260630-accounts"></script>
</body>
</html>
